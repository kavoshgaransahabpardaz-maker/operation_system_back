# Production compose — no bind mounts, no hot reload, Nginx reverse proxy,
# resource limits, restart policies, and named volumes for persistent data.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Required: copy .env.example → .env and fill every value before deploying.

x-app-common: &app-common
  build:
    context: .
    dockerfile: Dockerfile
  image: brokerai:${IMAGE_TAG:-latest}
  env_file: .env
  restart: unless-stopped
  networks:
    - internal
  logging:
    driver: "json-file"
    options:
      max-size: "20m"
      max-file: "5"

services:
  # ── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
    volumes:
      - minio_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  # ── Application ──────────────────────────────────────────────────────────────

  migrate:
    # One-shot container: runs Alembic migrations then exits.
    # Nginx/api only start after this completes successfully.
    <<: *app-common
    command: alembic upgrade head
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    <<: *app-common
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --loop uvloop
      --http httptools
      --proxy-headers
      --forwarded-allow-ips '*'
    expose:
      - "8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1g

  worker:
    <<: *app-common
    command: >
      celery -A app.core.celery_app worker
      --loglevel=warning
      -Q default,email,classification,matching,intel_collect,intel_parse,intel_enrich,intel_notify
      --concurrency=4
      --max-tasks-per-child=200
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "app.core.celery_app", "inspect", "ping", "-d", "celery@$$HOSTNAME"]
      interval: 60s
      timeout: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1g

  beat:
    <<: *app-common
    command: >
      celery -A app.core.celery_app beat
      --loglevel=warning
      --scheduler celery.beat:PersistentScheduler
    volumes:
      - beat_data:/app/celerybeat-schedule
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m

  # ── Reverse Proxy ────────────────────────────────────────────────────────────

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    networks:
      - internal
      - external
      - brokerai-web
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64m

  # ── SSL (certbot auto-renews every 12 h) ─────────────────────────────────────

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    networks:
      - external

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge
  brokerai-web:
    external: true

volumes:
  postgres_data:
  redis_data:
  minio_data:
  beat_data:
  certbot_www:
  certbot_certs:
  nginx_logs:
