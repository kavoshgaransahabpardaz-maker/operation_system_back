server {
    listen 80;
    server_name veritariffai.co www.veritariffai.co;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://veritariffai.co$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name veritariffai.co www.veritariffai.co;

    ssl_certificate     /etc/letsencrypt/live/veritariffai.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/veritariffai.co/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    if ($host = 'www.veritariffai.co') {
        return 301 https://veritariffai.co$request_uri;
    }

    resolver 127.0.0.11 valid=10s;
    set $frontend_upstream http://frontend:80;

    location / {
        proxy_pass         $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
