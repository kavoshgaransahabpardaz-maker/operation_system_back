# ── veritariffai.co — React SPA ───────────────────────────────────────────────
# Step 1: HTTP only — lets certbot issue the cert via ACME challenge
# After cert is issued, replace this file with the HTTPS version below.

server {
    listen 80;
    server_name veritariffai.co www.veritariffai.co;

    # Let's Encrypt ACME challenge (served by the certbot container)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        resolver 127.0.0.11 valid=10s;
        set $frontend_upstream http://frontend:80;
        proxy_pass         $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
