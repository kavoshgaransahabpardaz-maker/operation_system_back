# ── Step 1: HTTP only ─────────────────────────────────────────────────────────
# Active before SSL cert exists. Serves the ACME challenge so certbot can issue
# the cert. After cert is issued, swap to brokerai-ssl.conf:
#
#   cp nginx/conf.d/brokerai-ssl.conf nginx/conf.d/brokerai.conf
#   docker compose -f docker-compose.prod.yml exec nginx nginx -s reload

server {
    listen 80;
    server_name api.veritariffai.co;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass         http://brokerai_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;
        proxy_pass         http://brokerai_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 55m;
    }

    location /health {
        proxy_pass http://brokerai_api;
        access_log off;
    }

    location / {
        return 200 '{"service":"BrokerAI API","docs":"http://api.veritariffai.co/api/v1/docs"}';
        add_header Content-Type application/json;
    }
}
