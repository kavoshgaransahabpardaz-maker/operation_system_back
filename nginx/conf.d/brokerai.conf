# HTTP → HTTPS redirect
server {
    listen 80;
    server_name api.veritariffai.co;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Backend API (api.veritariffai.co) ─────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name api.veritariffai.co;

    ssl_certificate     /etc/letsencrypt/live/api.veritariffai.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.veritariffai.co/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    resolver 127.0.0.11 valid=10s;
    set $api_upstream http://api:8000;

    client_max_body_size 1024m;

    location /api/v1/auth/login {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass         $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;
        proxy_pass         $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location ~ ^/(docs|redoc|openapi.json|health) {
        proxy_pass         $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        access_log off;
    }
}
