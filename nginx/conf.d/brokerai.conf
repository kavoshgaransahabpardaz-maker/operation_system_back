# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;

    # Let's Encrypt challenge path (used by certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name ${DOMAIN};                    # replaced at deploy time

    # TLS — place your certs in the nginx_certs volume
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_prefer_server_ciphers on;

    # HSTS (6 months)
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    # Upload size limit — matches FastAPI 50 MB limit
    client_max_body_size 55m;

    # API endpoints
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;

        proxy_pass         http://brokerai_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # Auth endpoints — stricter rate limit
    location /api/v1/auth/login {
        limit_req zone=auth_limit burst=10 nodelay;

        proxy_pass         http://brokerai_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Health check — no rate limit, no auth
    location /health {
        proxy_pass         http://brokerai_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        access_log off;
    }

    # OpenAPI docs — disable in production if not needed
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass         http://brokerai_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        # Uncomment to restrict docs to internal IPs only:
        # allow 10.0.0.0/8;
        # deny all;
    }
}
