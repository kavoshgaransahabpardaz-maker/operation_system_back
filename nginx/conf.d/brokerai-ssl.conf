# ── Step 2: HTTPS ─────────────────────────────────────────────────────────────
# Activate after SSL cert is issued:
#
#   cp nginx/conf.d/brokerai-ssl.conf nginx/conf.d/brokerai.conf
#   docker compose -f docker-compose.prod.yml exec nginx nginx -s reload

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name api.veritariffai.co;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name api.veritariffai.co;

    ssl_certificate     /etc/letsencrypt/live/api.veritariffai.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.veritariffai.co/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    # Docker internal DNS — re-resolves "api" after container restarts
    resolver 127.0.0.11 valid=10s;
    set $api_upstream http://brokerai_api;

    client_max_body_size 55m;

    location /api/v1/auth/login {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass         $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;
        proxy_pass         $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass $api_upstream;
        access_log off;
    }

    location / {
        return 200 '{"service":"BrokerAI API","docs":"https://api.veritariffai.co/api/v1/docs"}';
        add_header Content-Type application/json;
    }
}
